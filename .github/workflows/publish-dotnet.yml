# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish-dotnet
on:
  workflow_dispatch: # Allow running the workflow manually from the GitHub UI
  push:
    branches:
      - 'main'       # Run the workflow when pushing to the main branch
    paths:
      - '.net/**'
      - '.github/workflows/publish-dotnet.yml'
  release:
    types:
      - published    # Run the workflow when a new GitHub release is published

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace }}/nuget

defaults:
  run:
    shell: pwsh

jobs:
  build_and_pack:
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'dotnet-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .net
    steps:
    - uses: actions/checkout@v4

    # Install the .NET SDK indicated in the global.json file
    - name: Setup .NET
      uses: actions/setup-dotnet@v4

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --filter Type!=Integration --no-restore --no-build --configuration Release

    - name: Pack
      run: dotnet pack --no-restore --no-build --configuration Release -p:RepositoryBranch="${{ github.ref_name }}" -p:RepositoryCommit="${{ github.sha }}" --output ${{ env.NuGetDirectory }}

    - uses: actions/upload-artifact@v4
      with:
        name: nuget
        if-no-files-found: error
        retention-days: 7
        path: ${{ env.NuGetDirectory }}/*.nupkg

  validate_nuget:
    runs-on: ubuntu-latest
    needs: [ build_and_pack ]
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      # Download the NuGet package created in the previous job
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Install nuget validator
        run: dotnet tool update Meziantou.Framework.NuGetPackageValidation.Tool --global

      # Validate metadata and content of the NuGet package
      # https://www.nuget.org/packages/Meziantou.Framework.NuGetPackageValidation.Tool#readme-body-tab
      - name: Validate package
        run: meziantou.validate-nuget-package (Get-ChildItem "${{ env.NuGetDirectory }}/*.nupkg")

  deploy:
    # Publish only when creating a GitHub Release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [ validate_nuget ]
    permissions:
      id-token: write  # Required for NuGet trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      # Install credential provider for trusted publishing (OIDC)
      - name: Install NuGet credential provider
        run: |
          Invoke-Expression "& { $(Invoke-RestMethod https://aka.ms/install-artifacts-credprovider.ps1) } -AddNetfx"

      # Publish to NuGet using trusted publishing (no API key needed)
      - name: Publish NuGet package
        env:
          NUGET_TOKEN_EXCHANGE_URL: "https://api.nuget.org/v3-oidc/token"
        run: |
          foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
              dotnet nuget push $file --source https://api.nuget.org/v3/index.json
          }
