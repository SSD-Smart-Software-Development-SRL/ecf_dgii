# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish-packagist
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'php/**'
      - '.github/workflows/publish-packagist.yml'
  release:
    types:
      - published

defaults:
  run:
    working-directory: php

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: composer test || true

  # Packagist auto-syncs from GitHub via webhook.
  # This job notifies Packagist to update after a release.
  notify_packagist:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Notify Packagist
        run: |
          curl -X POST "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d '{"repository":{"url":"https://github.com/${{ github.repository }}"}}'
