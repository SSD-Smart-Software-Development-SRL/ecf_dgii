# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish-react
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'react/**'
      - '.github/workflows/publish-react.yml'
  release:
    types:
      - published

defaults:
  run:
    working-directory: react

jobs:
  build:
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'react-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: react/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test || true

  deploy:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [ build ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: react/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack
        run: pnpm pack

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" *.tgz
        env:
          GH_TOKEN: ${{ github.token }}
