    RespuestaAnulacionRango:
      description: |-
        Respuesta de anulación de rango de secuencias de e-NCF.

        Representa la respuesta del servicio de anulación de rangos de secuencias de comprobantes
        fiscales electrónicos. Este modelo se utiliza para procesar la respuesta del servicio web
        de anulación de e-NCF de la DGII.

        Servicio Web:• Endpoint: /api/operaciones/anularrango• Método: POST• Formato de entrada: XML (formato ANECF)• Formato de respuesta: JSON o XMLValidaciones del Servicio:• Tipo de archivo válido (XML)• Firma del documento válida• Tipo de comprobante válido• Secuencias no utilizadas previamente• RNC autorizado para realizar transaccionesReferencia Oficial:• Descripción Técnica de Facturación Electrónica v1.6, Sección "Anulación de e-NCF"• Formato Anulación de e-NCF v1.0 - DGII
      example:
        codigo: 1
        rnc: 123456789
        mensajes:
        - Las secuencias fueron anuladas correctamente
        nombre: EMPRESA EJEMPLO SRL
      properties:
        rnc:
          description: |-
            Número de Registro Nacional del Contribuyente que envió la anulación.

            Corresponde al RNC del contribuyente que solicitó la anulación de las secuencias.
            Este valor debe coincidir con el RNC autorizado para realizar transacciones de anulación
            y debe estar registrado como Facturador Electrónico en la DGII.
          example: 123456789
          nullable: true
          type: string
        codigo:
          description: |-
            Código asociado al resultado de la validación de la anulación.

            Indica el código de estado del resultado de la operación de anulación.
            Los códigos proporcionan información sobre el éxito o fallo de la operación
            y los motivos específicos cuando hay errores.
          example: 1
          nullable: true
          type: string
        nombre:
          description: |-
            Razón social del contribuyente que realizó la anulación.

            Nombre o razón social del contribuyente asociado al RNC que solicitó la anulación.
            Este campo proporciona información adicional para identificación del contribuyente
            y corresponde al nombre registrado en la DGII.
          example: EMPRESA EJEMPLO SRL
          nullable: true
          type: string
        mensajes:
          description: |-
            Mensajes asociados al resultado de la validación de la anulación.

            Array de mensajes que proporcionan información detallada sobre el resultado de la operación.
            Puede incluir mensajes de éxito, advertencias, o errores específicos que ocurrieron
            durante el proceso de validación y anulación de las secuencias.
          example:
          - Las secuencias fueron anuladas correctamente
          items:
            type: string
          nullable: true
          type: array
    RespuestaConsultaEstado:
      description: |-
        Representa la respuesta del servicio de consulta de estado de e-CF.
        Este modelo contiene la información de validez y estado de un comprobante fiscal electrónico
        consultado a través del servicio web de consulta estado de la DGII.
      example:
        codigo: 0
        estado: estado
        totalITBIS: 1.4658129805029452
        codigoSeguridad: codigoSeguridad
        fechaFirma: fechaFirma
        idExtranjero: idExtranjero
        fechaEmision: fechaEmision
        ncfElectronico: ncfElectronico
        montoTotal: 6.027456183070403
        rncComprador: rncComprador
        rncEmisor: rncEmisor
      properties:
        codigo:
          $ref: "#/components/schemas/RespuestaConsultaEstado_codigo"
        estado:
          description: |-
            Estado de validación otorgado por Impuestos Internos al e-CF recibido.
            Descripción textual del estado del comprobante fiscal electrónico.
          nullable: true
          type: string
        rncEmisor:
          description: |-
            Número de registro nacional del contribuyente que envió el e-CF.
            RNC del emisor del comprobante fiscal electrónico.
          nullable: true
          type: string
        ncfElectronico:
          description: |-
            Número de secuencia utilizada por el contribuyente en el e-CF.
            Número de comprobante fiscal electrónico (e-NCF) utilizado en la transacción.
          nullable: true
          type: string
        montoTotal:
          $ref: "#/components/schemas/RespuestaConsultaEstado_montoTotal"
        totalITBIS:
          $ref: "#/components/schemas/RespuestaConsultaEstado_totalITBIS"
        fechaEmision:
          description: |-
            Fecha de emisión extraída del e-CF recibido.
            Fecha en que fue emitido el comprobante fiscal electrónico.
          nullable: true
          type: string
        fechaFirma:
          description: |-
            Fecha de firma extraída del e-CF recibido.
            Fecha en que fue firmado digitalmente el comprobante fiscal electrónico.
          nullable: true
          type: string
        rncComprador:
          description: |-
            RNC del comprador extraído del e-CF recibido (si aplica).
            Número de registro nacional del contribuyente comprador, cuando corresponde.
          nullable: true
          type: string
        codigoSeguridad:
          description: "Código de seguridad extraído de los primeros seis (6) dígitos\
            \ del hash generado \nen el SignatureValue de la firma digital del e-CF\
            \ recibido.\nCódigo de seguridad de 6 caracteres para validación del comprobante."
          nullable: true
          type: string
        idExtranjero:
          description: |-
            Identificación de extranjero extraída del e-CF recibido (si aplica).
            Número de identificación del comprador extranjero cuando corresponde.
          nullable: true
          type: string
    RespuestaConsultaRFCE:
      description: |-
        Representa la respuesta del servicio de Consulta de Resumen de Factura (RFCE) de la DGII.
        Este servicio permite validar la validez fiscal de un comprobante fiscal electrónico
        a través del RNC emisor, e-NCF y código de seguridad.
      example:
        codigo: codigo
        estado: estado
        encf: encf
        rnc: rnc
        secuenciaUtilizada: true
        mensajes:
        - codigo: 1
          valor: El comprobante fue aceptado correctamente
        - codigo: 1
          valor: El comprobante fue aceptado correctamente
      properties:
        rnc:
          description: |-
            Número de registro nacional del contribuyente que envió el e-CF.
            RNC del emisor del comprobante fiscal electrónico consultado.
          nullable: true
          type: string
        encf:
          description: |-
            Número de secuencia utilizada por el contribuyente en el ENCF.
            Número de comprobante fiscal electrónico (e-NCF) consultado.
          type: string
        secuenciaUtilizada:
          description: |-
            Indica si el número de secuencia puede ser reutilizado.
            `true` si la secuencia NO puede reutilizarse (rechazado por motivos específicos);
                    `false` si la secuencia SÍ puede reutilizarse.
          type: boolean
        codigo:
          description: |-
            Código asociado al estado de validación del e-CF recibido.
            Código numérico que indica el resultado de la validación:
            - 0: No encontrado
            - 1: Aceptado
            - 2: Rechazado
            - 4: Aceptado Condicional (solo para FC &lt; RD$ 250000.00)
          nullable: true
          type: string
        estado:
          description: |-
            Estado de validación otorgado por Impuestos Internos al e-CF recibido.
            Descripción textual del estado de validación del comprobante.
          nullable: true
          type: string
        mensajes:
          description: |-
            Mensajes y códigos asociados al estado de validación del e-CF recibido.
            Array de mensajes que proporcionan detalles adicionales sobre la validación.
          items:
            $ref: "#/components/schemas/Mensaje"
          nullable: true
          type: array
    RespuestaConsultaTimbre:
      description: |-
        Representa la respuesta del servicio de Consulta Timbre Fiscal (QR) de la DGII.
        Este servicio permite validar la validez de un e-CF remitido exclusivamente por el servicio web
        de recepción de e-CF, a partir de los datos incluidos en el timbre de su representación impresa (RI).
      example:
        razonSocial: razonSocial
        estado: estado
        encf: encf
        rncEmisor: rncEmisor
      properties:
        rncEmisor:
          description: |-
            Número de registro nacional del contribuyente que emitió el resumen de factura de consumo.
            RNC del emisor del comprobante fiscal electrónico consultado.
          nullable: true
          type: string
        razonSocial:
          description: |-
            Razón social del contribuyente que emitió el resumen de factura de consumo.
            Nombre comercial o razón social del emisor del comprobante fiscal electrónico.
          nullable: true
          type: string
        encf:
          description: |-
            Número de secuencia utilizada por el contribuyente, extraído del resumen de factura de consumo.
            Número de comprobante fiscal electrónico (e-NCF) utilizado en la transacción.
          nullable: true
          type: string
        estado:
          description: |-
            Estado de validación otorgado por Impuestos Internos al resumen de factura de consumo recibido.
            Descripción textual del estado de validación del comprobante. Posibles valores:
            - "No fue encontrada la factura (e-CF)": El e-CF no se encontró en la base de datos de la DGII.
            - "Aceptado": Implica la validez del e-CF de la RI, incluyendo el aceptado condicional que corresponde
              a que no cumplió en algún punto pero que no amerita el rechazo de este.
            - "Rechazado": Corresponde a que el e-CF de la RI le fue rechazado al emisor.
          nullable: true
          type: string
    RespuestaConsultaTrackId:
      description: |-
        Representa la respuesta del servicio de consulta de resultado de comprobantes fiscales electrónicos (e-CF).
        Este modelo contiene la información completa sobre el estado de procesamiento y validación de un e-CF
        que fue enviado previamente mediante el servicio de recepción.
      example:
        codigo: "1"
        estado: Aceptado
        encf: E310000000001
        trackId: ddddd
        rnc: "131880738"
        secuenciaUtilizada: false
        mensajes:
        - codigo: 1
          valor: El comprobante fue aceptado correctamente
        - codigo: 1
          valor: El comprobante fue aceptado correctamente
        fechaRecepcion: 2020-12-17T11:19:06
      properties:
        trackId:
          description: |-
            Obtiene el número único generado por Impuestos Internos para identificar un e-CF recibido.
            Este identificador se obtiene como respuesta del servicio de recepción de e-CF.
            El identificador único del track. Puede ser null si no está disponible.
          example: ddddd
          nullable: true
          type: string
        codigo:
          description: |-
            Obtiene el código asociado al estado de validación del e-CF recibido.
            Un código que indica el resultado de la validación. Los valores típicos son:
            - "0": No encontrado
            - "1": Aceptado
            - "2": Rechazado
            - "3": En Proceso
            - "4": Aceptado Condicional
          example: "1"
          nullable: true
          type: string
        estado:
          description: |-
            Obtiene el estado de validación otorgado por Impuestos Internos al e-CF recibido.
            Descripción textual del estado. Puede incluir valores como:
            - "No encontrado": No se encontró el trackid en los registros
            - "Aceptado": Implica la validez del e-CF
            - "Rechazado": Implica la nulidad del comprobante para fines tributarios
            - "En Proceso": El comprobante aún no ha sido validado
            - "Aceptado Condicional": El comprobante no cumplió en algún punto pero no ameritó el rechazo
          example: Aceptado
          nullable: true
          type: string
        rnc:
          description: |-
            Obtiene el número de registro nacional del contribuyente que envió el e-CF.
            El RNC del emisor del comprobante. Puede ser null si no está disponible.
          example: "131880738"
          nullable: true
          type: string
        encf:
          description: |-
            Obtiene el número de secuencia utilizada por el contribuyente en el e-CF.
            El número de comprobante fiscal electrónico (e-NCF). Puede ser null si no está disponible.
          example: E310000000001
          nullable: true
          type: string
        secuenciaUtilizada:
          description: |-
            Indica si el número de secuencia puede ser reutilizada en otro e-CF.
            True si la secuencia puede reutilizarse, False si no puede reutilizarse.

            Este parámetro permite dar a conocer si el número de secuencia que fue recibido
            por Impuestos Internos puede reutilizarse en otro Comprobante Fiscal Electrónico (e-CF)
            en el escenario de que el resultado de la validación haya sido "Rechazado" por los siguientes motivos:
            - Certificado y/o firma inválida
            - Estructura del comprobante (XML) no es válida
            - Firmante del comprobante fiscal electrónico no corresponde a un delegado autorizado
            - El e-NCF no está autorizado para el RNC Emisor
            - El e-NCF autorizado se encuentra vencido
            - El RNC Emisor no corresponde a un emisor electrónico
            - El RNC Emisor no existe o no se encuentra activo
          example: false
          type: boolean
        fechaRecepcion:
          description: |-
            Obtiene la fecha en la cual Impuestos Internos recibió el e-CF.
            La fecha de recepción del comprobante. Puede ser null si no está disponible.
            El formato típico es ISO 8601 o un formato de fecha legible.
          example: 2020-12-17T11:19:06
          nullable: true
          type: string
        mensajes:
          description: |-
            Obtiene los mensajes asociados al estado de validación del e-CF recibido.
            Un array de mensajes que proporcionan información detallada sobre el estado
            de validación. Puede ser null si no hay mensajes disponibles.
          items:
            $ref: "#/components/schemas/Mensaje"
          nullable: true
          type: array
    RespuestaEstatusServicio:
      description: |-
        Modelo de respuesta que representa el estado de un servicio específico de facturación electrónica en un ambiente específico.
        Utilizado por el endpoint /api/estatusservicios/obtenerestatus.
      example:
