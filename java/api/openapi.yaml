    VentanaDeMantenimiento:
      description: |-
        Representa información de ventana de mantenimiento para un ambiente específico.
        Contiene detalles sobre cuándo ocurrirá el mantenimiento programado.
      example:
        horaFin: horaFin
        ambiente: ambiente
        dias:
        - dias
        - dias
        horaInicio: horaInicio
      properties:
        ambiente:
          description: |-
            Nombre del ambiente donde aplica la ventana de mantenimiento.
            Valores posibles:
            - "PreCertificacion": Ambiente de pre-certificación
            - "Certificacion": Ambiente de certificación
            - "Produccion": Ambiente de producción
          nullable: true
          type: string
        horaInicio:
          description: |-
            Hora de inicio de la ventana de mantenimiento.
            Formato: "H:MM AM/PM" (ejemplo: "9:00 AM", "1:00 PM")
          nullable: true
          type: string
        horaFin:
          description: |-
            Hora de fin de la ventana de mantenimiento.
            Formato: "H:MM AM/PM" (ejemplo: "12:00 PM", "4:00 PM")
          nullable: true
          type: string
        dias:
          description: |-
            Arreglo de fechas específicas cuando están programadas las ventanas de mantenimiento.
            Formato: "DD-MM-YYYY" (ejemplo: "06-08-2020", "20-08-2020")
          items:
            type: string
          nullable: true
          type: array
