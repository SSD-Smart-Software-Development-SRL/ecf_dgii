    Directorio:
      description: "Representa una entrada del directorio para contribuyentes electró\
        nicos en el sistema de facturación electrónica \nde la República Dominicana.\
        \ Este modelo contiene las URLs de servicios que los contribuyentes electró\
        nicos \ndeben proporcionar para la comunicación entre contribuyentes."
      example:
        urlRecepcion: urlRecepcion
        urlAceptacion: urlAceptacion
        rnc: rnc
        urlOpcional: urlOpcional
        nombre: nombre
      properties:
        nombre:
          description: |-
            Obtiene el nombre legal o razón social del contribuyente electrónico.
            La razón social registrada tal como aparece en el registro oficial del contribuyente.
            Este campo es requerido y debe coincidir con el nombre de la entidad legal del contribuyente.
          nullable: true
          type: string
        rnc:
          description: "Obtiene el Número de Registro Nacional del Contribuyente (RNC)\
            \ del contribuyente electrónico.\nUn número de 9 dígitos que identifica\
            \ de forma única al contribuyente en el sistema tributario \nde la Repú\
            blica Dominicana. Este campo es requerido y debe tener un formato de RNC\
            \ válido."
          nullable: true
          type: string
        urlRecepcion:
          description: |-
            Obtiene la URL del servicio de recepción de facturas electrónicas.
            La URL completa donde otros contribuyentes pueden enviar facturas electrónicas (e-CF) a este contribuyente.
            Debe seguir el formato estándar: https://host/ambiente/nombreservicio/fe/recepcion/api/ecf
            Este campo es obligatorio para todos los contribuyentes electrónicos.
          nullable: true
          type: string
        urlAceptacion:
          description: |-
            Obtiene la URL del servicio de aprobación comercial.
            La URL completa donde otros contribuyentes pueden enviar aprobaciones comerciales para facturas recibidas.
            Debe seguir el formato estándar: https://host/ambiente/nombreservicio/fe/aprobacioncomercial/api/ecf
            Este campo es obligatorio para todos los contribuyentes electrónicos.
          nullable: true
          type: string
        urlOpcional:
          description: |-
            Obtiene la URL del servicio opcional de autenticación.
            La URL base del servicio de autenticación, si es implementado por el contribuyente.
            Debe seguir el formato estándar: https://host/ambiente/nombreservicio/fe/autenticacion/api/
            Este campo es opcional pero recomendado para mayor seguridad.
          nullable: true
          type: string
